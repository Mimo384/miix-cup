<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>منصة احتفال كأس العالم التفاعلية</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: radial-gradient(circle, #240a34 0%, #0b0114 100%);
            color: white; font-family: sans-serif; text-align: center;
            touch-action: none; user-select: none;
        }
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 1, 20, 0.95); display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        h2 { color: #ffd700; }
        select, button {
            padding: 12px 25px; font-size: 18px; border-radius: 25px;
            border: 2px solid #ffd700; background: #240a34; color: white; cursor: pointer; margin: 10px;
        }
        #game-screen { position: relative; width: 100vw; height: 100vh; display: none; }
        #status { position: absolute; top: 5%; width: 100%; font-size: 22px; font-weight: bold; z-index: 10; }
        #trophy-container { position: absolute; bottom: 35%; left: 50%; transform: translateX(-50%); width: 180px; z-index: 5; }
        #trophy { width: 100%; filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)); }
        #players-container { position: absolute; bottom: 5%; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 10; }
        .player-card { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #ffd700; overflow: hidden; background: #111; }
        .player-card img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2>🏆 تجهيز منصة التتويج 🏆</h2>
        <label for="player-count">اختر عدد اللاعبين:</label>
        <select id="player-count">
            <option value="1">1</option> <option value="2">2</option> <option value="3">3</option> <option value="4" selected>4</option> <option value="5">5</option>
        </select>
        <button onclick="startGame()">ابدأ الاحتفال 🔥</button>
    </div>

    <div id="game-screen">
        <div id="status">ضعوا أصابعكم على الكأس وحركوه معاً!</div>
        <div id="trophy-container">
            <img id="trophy" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/World_Cup_trophy_icon.png" alt="كأس العالم">
        </div>
        <div id="players-container"></div>
    </div>

    <script>
        let requiredTouches = 4;
        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const trophyContainer = document.getElementById('trophy-container');
        const statusText = document.getElementById('status');
        const playersContainer = document.getElementById('players-container');

        function startGame() {
            requiredTouches = parseInt(document.getElementById('player-count').value);
            setupScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            buildPlayerList();
        }

        function buildPlayerList() {
            playersContainer.innerHTML = '';
            for (let i = 0; i < requiredTouches; i++) {
                const card = document.createElement('div');
                card.className = 'player-card';
                const img = document.createElement('img');
                img.src = "https://cdn.discordapp.com/embed/avatars/0.png";
                card.appendChild(img);
                playersContainer.appendChild(card);
            }
        }

        window.addEventListener('touchmove', handleTouch, { passive: false });
        window.addEventListener('touchstart', handleTouch, { passive: false });
        window.addEventListener('touchend', (e) => {
            if(e.touches.length < requiredTouches) statusText.innerHTML = `مطلوب وضع عدد الأصابع: (${e.touches.length} من أصل ${requiredTouches})`;
        });

        function handleTouch(e) {
            e.preventDefault();
            let activeTouches = e.touches.length;
            if (activeTouches >= requiredTouches) {
                statusText.innerHTML = "🔥 واااااو! احتفااااال بطل الـ Mix Cup! 🔥";
                let sumX = 0;
                for (let i = 0; i < activeTouches; i++) { sumX += e.touches[i].clientX; }
                let avgX = sumX / activeTouches;
                trophyContainer.style.left = avgX + 'px';
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
            } else {
                statusText.innerHTML = `مطلوب وضع عدد الأصابع: (${activeTouches} من أصل ${requiredTouches})`;
            }
        }
    </script>
</body>
</html>
